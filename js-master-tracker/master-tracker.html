<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Master Tracker</title>
  <link rel="stylesheet" href="master-tracker.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <h1 class="app-title">JS Master Tracker</h1>
    <div class="header-right">
      <span id="currentDate"></span>
      <div class="streak-badge">
        🔥 <span id="streakCount">0</span> Day Streak
      </div>
      <button id="themeToggle" class="btn-primary">🌙 Dark Mode</button>
    </div>
  </header>
  
  <div class="backup-controls">
    <button id="exportData" class="btn-primary">Export Data</button>

    <label class="btn-primary">
        Import Data
        <input type="file" id="importData" hidden>
    </label>
  </div>

  <main class="dashboard">

    <!-- Learning Section -->
    <section class="card">
      <h2>📘 Today's Learning</h2>

      <form id="learningForm">
        <input type="text" id="topicInput" placeholder="Enter topic..." required>
        <textarea id="notesInput" placeholder="Write notes..."></textarea>
        <button type="submit" class="btn-primary">Add Learning</button>
      </form>

      <input type="text" id="learningSearch" placeholder="Search learning..." />
      <select id="learningFilter">
        <option value="all">All</option>
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
      </select>

      <select id="learningSort">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
      </select>

      <ul id="learningList" class="list"></ul>
    </section>

    <!-- Progress Section -->
    <section class="card">
      <h2>📊 Topic Progress</h2>
      <div id="progressContainer"></div>
    </section>

    <!-- Question Section -->
    <section class="card">
      <h2>💡 Interview Question Bank</h2>

      <form id="questionForm">
        <input type="text" id="questionInput" placeholder="Enter question..." required>
        <textarea id="answerInput" placeholder="Enter answer..."></textarea>
        <button type="submit" class="btn-primary">Add Question</button>
      </form>

      <input type="text" id="questionSearch" placeholder="Search question..." />
      <select id="questionFilter">
        <option value="all">All</option>
        <option value="revised">Revised</option>
        <option value="not-revised">Not Revised</option>
      </select>

      <ul id="questionList" class="list"></ul>
    </section>

  </main>

</div>

<script src="master-tracker.js"></script>
</body>
</html>
